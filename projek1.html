<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Neon Pixel Explosion</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles = [];
        const PINK = "#ff2d75"; // Warna Pink Neon Utama
        const P_COUNT = 3000; // Jumlah partikel kotak agar teks padat

        // Status Animasi: HEART -> EXPLOSION -> TEXT -> HEART
        let state = "HEART"; 

        const messages = [
            "Hi, this is your secret admirer",
            "I want you to know, I've admired you for a long time",
            "sorry i said it this way",
            "because I don't have the ability to say this to you directly"
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // --- CLASS PARTIKEL KOTAK (PIXEL) ---
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.destX = this.x;
                this.destY = this.y;
                // Properti untuk ledakan
                this.velX = 0;
                this.velY = 0;
                this.friction = 0.96; // Gesekan agar melambat pelan-pelan
                this.size = 2; // Ukuran kotak (pixel)
                this.color = PINK;
                this.speed = 0.07;
            }
            update() {
                if (state === "EXPLOSION") {
                    // Logika Ledakan: Partikel menembak ke luar
                    this.x += this.velX;
                    this.y += this.velY;
                    // Melambat secara bertahap
                    this.velX *= this.friction;
                    this.velY *= this.friction;
                } else {
                    // Pergerakan Easing normal menuju tujuan (Teks/Love)
                    this.x += (this.destX - this.x) * this.speed;
                    this.y += (this.destY - this.y) * this.speed;
                }
            }
            draw() {
                // Beri efek Neon Glow yang kuat
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = PINK;
                
                // --- MENGGAMBAR KOTAK (PIXEL) ---
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                
                ctx.restore();
            }
        }

        // --- AMBIL TITIK KOORDINAT (LOVE & TEKS) ---
        function getHeartPoints() {
            const pts = [];
            const scale = Math.min(width, height) / 55;
            for (let i = 0; i < P_COUNT; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random());
                const x = 16 * Math.pow(Math.sin(t), 3) * scale * r;
                const y = (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * scale * r;
                pts.push({ x: width / 2 + x, y: height / 2.2 - y });
            }
            return pts;
        }

        function getTextPoints(text) {
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
            tCanvas.width = width; tCanvas.height = height;

            const fSize = Math.min(width / 11, 35);
            tCtx.font = `bold ${fSize}px sans-serif`;
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillStyle = 'white';

            const words = text.split(' ');
            let line = '', lines = [];
            const maxWidth = width * 0.85;

            words.forEach(w => {
                if (tCtx.measureText(line + w).width < maxWidth) line += w + ' ';
                else { lines.push(line.trim()); line = w + ' '; }
            });
            lines.push(line.trim());
            
            const lineHeight = fSize * 1.6;
            const totalHeight = lines.length * lineHeight;
            let startY = (height / 2) - (totalHeight / 2) + (lineHeight / 2);

            lines.forEach((l, i) => {
                tCtx.fillText(l, width / 2, startY + (i * lineHeight));
            });

            const data = tCtx.getImageData(0, 0, width, height).data;
            const pts = [];
            // Scan pixel lebih rapat (step 2) agar teks tajam
            for (let i = 0; i < data.length; i += 4 * 2) { 
                if (data[i + 3] > 128) {
                    const idx = i / 4;
                    pts.push({ x: idx % width, y: Math.floor(idx / width) });
                }
            }
            return pts;
        }

        function setTargets(targetPoints, color) {
            if (targetPoints.length === 0) return;
            const shuffled = [...targetPoints].sort(() => Math.random() - 0.5);
            for (let i = 0; i < P_COUNT; i++) {
                const target = shuffled[i % shuffled.length];
                particles[i].destX = target.x;
                particles[i].destY = target.y;
                particles[i].color = color;
            }
        }

        let msgIdx = -1;
        function flow() {
            msgIdx++;
            if (msgIdx < messages.length) {
                const currentText = messages[msgIdx];
                setTargets(getTextPoints(currentText), PINK); // Teks juga Pink Neon
                
                let d = 8500 + (currentText.split(' ').length * 600);
                setTimeout(flow, d);
            } else {
                state = "HEART";
                setTargets(getHeartPoints(), PINK);
            }
        }

        // --- FUNGSI LEDAKAN SUPER ---
        function shatters() {
            state = "EXPLOSION";
            particles.forEach(p => {
                // Arah ledakan acak ke segala sisi
                const angle = Math.random() * Math.PI * 2;
                // Kekuatan ledakan sangat tinggi (5-25 pixel/frame)
                const force = Math.random() * 20 + 5; 
                p.velX = Math.cos(angle) * force;
                p.velY = Math.sin(angle) * force;
            });

            // Kasih jeda waktu meledak selama 700ms sebelum berkumpul ke teks
            setTimeout(() => {
                state = "TEXT";
                flow(); // Mulai teks pertama setelah meledak
            }, 700); 
        }

        function animate() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        resize();
        for (let i = 0; i < P_COUNT; i++) particles.push(new Particle());
        
        // Awal: Bentuk Love Pink Besar
        setTargets(getHeartPoints(), PINK);
        
        // Jeda 5 detik di awal, lalu MELEDAK ke segala sisi
        setTimeout(shatters, 5000); 
        animate();

        window.addEventListener('resize', () => { location.reload(); });
    </script>
</body>
</html>
