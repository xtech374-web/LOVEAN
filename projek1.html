<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Tracking - Pink Neon Pixel</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
        #video {
            position: absolute; bottom: 20px; right: 20px;
            width: 150px; height: 110px;
            border: 2px solid #ff2d75; border-radius: 8px;
            z-index: 1; transform: scaleX(-1); opacity: 0.3;
        }
        .status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #ff2d75; font-family: 'Courier New', monospace;
            z-index: 10; font-size: 16px; font-weight: bold;
            text-shadow: 0 0 10px #ff2d75; text-align: center;
        }
    </style>
</head>
<body>

    <div class="status" id="status">WAITING FOR CAMERA...</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const videoElement = document.getElementById("video");
        const statusText = document.getElementById("status");

        let width, height, particlesArray = [];
        let handX = null, handY = null;
        let state = "EXPLOSION"; // Awalnya meledak dulu
        const PINK_NEON = "#ff2d75";

        function setCanvasSize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        setCanvasSize();

        // --- 1. FUNGSI GAMBAR PIXEL NEON (KOTAK) ---
        function drawPixelNeon(x, y, size, color) {
            ctx.save();
            // Efek Glow Neon
            ctx.shadowBlur = 12;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            
            // Gambar Kotak (Pixel)
            ctx.fillRect(x - size/2, y - size/2, size, size);
            
            // Inti Putih agar terlihat menyala
            ctx.fillStyle = "#fff";
            ctx.fillRect(x - (size*0.4)/2, y - (size*0.4)/2, size*0.4, size*0.4);
            ctx.restore();
        }

        // --- 2. AMBIL TITIK KOORDINAT TULISAN ---
        function createTextPixels() {
            ctx.fillStyle = "white";
            const fontSize = Math.min(width * 0.15, 130);
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("I LOVE YOU", width / 2, height / 2);
            
            const data = ctx.getImageData(0, 0, width, height);
            ctx.clearRect(0, 0, width, height);
            return data;
        }

        // --- 3. CLASS PARTIKEL PIXEL ---
        class Particle {
            constructor(x, y) {
                // Mulai dari tengah layar saat meledak
                this.x = width / 2;
                this.y = height / 2;
                this.destX = x;
                this.destY = y;
                
                this.size = Math.random() * 3 + 3;
                // Kecepatan awal untuk ledakan ke segala sisi
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 25 + 10;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                
                this.friction = 0.95;
                this.springFactor = 0.08;
                this.color = PINK_NEON;
            }

            draw() {
                drawPixelNeon(this.x, this.y, this.size, this.color);
            }

            update() {
                if (state === "EXPLOSION") {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    
                    // Transisi ke mode stabil setelah melambat
                    if (Math.abs(this.vx) < 0.5) state = "STABLE";
                } else {
                    // Kembali ke posisi tulisan
                    let dx = this.destX - this.x;
                    let dy = this.destY - this.y;
                    this.vx += dx * this.springFactor;
                    this.vy += dy * this.springFactor;
                    this.vx *= 0.7; // Redaman agar tidak goyang berlebihan
                    this.vy *= 0.7;
                    this.x += this.vx;
                    this.y += this.vy;
                }

                // Interaksi Hand Tracking (AI)
                if (handX != null && handY != null) {
                    let hx = handX - this.x;
                    let hy = handY - this.y;
                    let dist = Math.sqrt(hx * hx + hy * hy);
                    if (dist < 120) {
                        let angle = Math.atan2(hy, hx);
                        let push = (120 - dist) * 0.3; 
                        this.vx -= Math.cos(angle) * push;
                        this.vy -= Math.sin(angle) * push;
                    }
                }
            }
        }

        function init() {
            particlesArray = [];
            const pixelData = createTextPixels();
            const density = 10;

            for (let y = 0; y < pixelData.height; y += density) {
                for (let x = 0; x < pixelData.width; x += density) {
                    const index = (y * 4 * pixelData.width) + (x * 4) + 3;
                    if (pixelData.data[index] > 128) {
                        particlesArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; // Efek trail sedikit
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        // --- 4. SETUP MEDIA PIPE HANDS ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusText.style.display = 'none';
                const finger = results.multiHandLandmarks[0][8]; 
                handX = (1 - finger.x) * width;
                handY = finger.y * height;
            } else {
                handX = null; handY = null;
                statusText.style.display = 'block';
                statusText.innerText = "WAVE YOUR HAND";
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        camera.start().then(() => {
            statusText.innerText = "READY!";
            init();
            animate();
        });

        window.addEventListener('resize', () => {
            setCanvasSize();
            init();
        });
    </script>
</body>
</html>
