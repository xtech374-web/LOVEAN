<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Tracking - Optimized Pink Neon</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
        #video {
            position: absolute; bottom: 20px; right: 20px;
            width: 120px; height: 90px;
            border: 1px solid #ff2d75; border-radius: 8px;
            z-index: 1; transform: scaleX(-1); opacity: 0.2;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d", { alpha: false }); // Optimasi konteks
        const videoElement = document.getElementById("video");

        let width, height, particlesArray = [];
        let handX = null, handY = null;

        function setCanvasSize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        setCanvasSize();

        function createTextPixels() {
            ctx.fillStyle = "white";
            const fontSize = Math.min(width * 0.12, 110);
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("I LOVE YOU", width / 2, height / 2);
            const data = ctx.getImageData(0, 0, width, height);
            ctx.clearRect(0, 0, width, height);
            return data;
        }

        class Particle {
            constructor(x, y) {
                this.x = width / 2 + (Math.random() - 0.5) * 100;
                this.y = height / 2 + (Math.random() - 0.5) * 100;
                this.destX = x;
                this.destY = y;
                this.size = 3;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.friction = 0.92;
                this.spring = 0.06;
            }

            update() {
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                
                this.vx += dx * this.spring;
                this.vy += dy * this.spring;
                this.vx *= this.friction;
                this.vy *= this.friction;

                if (handX !== null && handY !== null) {
                    let hx = handX - this.x;
                    let hy = handY - this.y;
                    let distSq = hx * hx + hy * hy; // Gunakan kuadrat agar lebih cepat
                    if (distSq < 14400) { // 120 * 120
                        let dist = Math.sqrt(distSq);
                        let angle = Math.atan2(hy, hx);
                        let push = (120 - dist) * 0.4;
                        this.vx -= Math.cos(angle) * push;
                        this.vy -= Math.sin(angle) * push;
                    }
                }
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                // Gambar tanpa shadowBlur berat untuk tiap partikel
                ctx.fillStyle = "#ff2d75";
                ctx.fillRect(this.x - 1.5, this.y - 1.5, 3, 3);
                ctx.fillStyle = "#fff";
                ctx.fillRect(this.x - 0.5, this.y - 0.5, 1, 1);
            }
        }

        function init() {
            particlesArray = [];
            const pixelData = createTextPixels();
            // Density dinaikkan ke 12 agar jumlah partikel berkurang (lebih enteng)
            const density = 12; 
            for (let y = 0; y < pixelData.height; y += density) {
                for (let x = 0; x < pixelData.width; x += density) {
                    if (pixelData.data[(y * 4 * pixelData.width) + (x * 4) + 3] > 128) {
                        particlesArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, width, height);
            
            // Pindahkan shadowBlur ke level canvas (global) agar lebih ringan
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff2d75";

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const finger = results.multiHandLandmarks[0][8]; 
                handX = (1 - finger.x) * width;
                handY = finger.y * height;
            } else {
                handX = null; handY = null;
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 480, height: 360 // Resolusi kamera lebih kecil agar enteng
        });

        camera.start().then(() => {
            init();
            animate();
        });
    </script>
</body>
</html>
