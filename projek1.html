<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Neon Pixel - AI Hand Tracking</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
        #video {
            position: absolute; bottom: 15px; right: 15px;
            width: 100px; height: 75px;
            border: 1px solid #ff2d75; border-radius: 5px;
            z-index: 1; transform: scaleX(-1); opacity: 0.2;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const videoElement = document.getElementById("video");

        let width, height, particlesArray = [];
        let handX = null, handY = null;

        function setCanvasSize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        setCanvasSize();

        function createTextPixels() {
            ctx.fillStyle = "white";
            const fontSize = Math.min(width * 0.12, 100);
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("I LOVE YOU", width / 2, height / 2);
            const data = ctx.getImageData(0, 0, width, height);
            ctx.clearRect(0, 0, width, height);
            return data;
        }

        class Particle {
            constructor(x, y) {
                this.x = width / 2;
                this.y = height / 2;
                this.destX = x;
                this.destY = y;
                this.size = 3;
                // Ledakan awal yang lebih halus
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
            }

            update() {
                // Pergerakan dasar (kembali ke posisi teks)
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                
                this.vx += dx * 0.05;
                this.vy += dy * 0.05;
                this.vx *= 0.85; // Friksi
                this.vy *= 0.85;

                // Interaksi Tangan (Disederhanakan agar ringan)
                if (handX !== null) {
                    let hx = handX - this.x;
                    let hy = handY - this.y;
                    let distSq = hx * hx + hy * hy;
                    if (distSq < 10000) { // Jarak interaksi 100px
                        let dist = Math.sqrt(distSq);
                        let force = (100 - dist) * 0.6;
                        this.vx -= (hx / dist) * force;
                        this.vy -= (hy / dist) * force;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                // Render pixel neon (pink)
                ctx.fillStyle = "#ff2d75";
                ctx.fillRect(this.x - 1.5, this.y - 1.5, 3, 3);
                // Titik putih di tengah agar efek neon terasa
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(this.x - 0.5, this.y - 0.5, 1, 1);
            }
        }

        function init() {
            particlesArray = [];
            const pixelData = createTextPixels();
            const density = 12; // Jumlah partikel yang pas untuk performa SMK/HP
            for (let y = 0; y < pixelData.height; y += density) {
                for (let x = 0; x < pixelData.width; x += density) {
                    if (pixelData.data[(y * 4 * pixelData.width) + (x * 4) + 3] > 128) {
                        particlesArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Glow global (sekali set untuk semua, biar enteng)
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff2d75";

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        // Mode paling ringan: modelComplexity 0
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmark = results.multiHandLandmarks[0][8];
                handX = (1 - landmark.x) * width;
                handY = landmark.y * height;
            } else {
                handX = null;
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 320, height: 240 // Resolusi deteksi diperkecil agar sangat lancar
        });

        camera.start().then(() => {
            init();
            animate();
        });
    </script>
</body>
</html>
