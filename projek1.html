<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pixel Final - Smooth & Dense</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
        #video {
            position: absolute; bottom: 10px; right: 10px;
            width: 80px; height: 60px;
            border: 1px solid #ff2d75; border-radius: 4px;
            z-index: 1; transform: scaleX(-1); opacity: 0.1;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        const videoElement = document.getElementById("video");

        let width, height, particlesArray = [];
        let handX = null, handY = null;

        function setCanvasSize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        setCanvasSize();

        function createTextPixels() {
            // Gunakan font yang lebih tebal agar partikel lebih kumpul
            const fontSize = Math.min(width * 0.15, 120);
            ctx.font = `900 ${fontSize}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "white";
            ctx.fillText("I LOVE YOU", width / 2, height / 2);
            const data = ctx.getImageData(0, 0, width, height);
            ctx.clearRect(0, 0, width, height);
            return data;
        }

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.destX = x;
                this.destY = y;
                this.vx = 0;
                this.vy = 0;
                this.accel = 0.05;
                this.friction = 0.85;
            }

            update() {
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                
                this.vx += dx * this.accel;
                this.vy += dy * this.accel;
                this.vx *= this.friction;
                this.vy *= this.friction;

                if (handX !== null) {
                    let hx = handX - this.x;
                    let hy = handY - this.y;
                    let distSq = hx * hx + hy * hy;
                    if (distSq < 8100) { // Radius 90px
                        let dist = Math.sqrt(distSq);
                        let force = (90 - dist) * 0.5;
                        this.vx -= (hx / dist) * force;
                        this.vy -= (hy / dist) * force;
                    }
                }
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                // Efek Neon tanpa Shadow (Layered Rect)
                // Lapis 1: Aura Pink Luar (lebih besar)
                ctx.fillStyle = "rgba(255, 45, 117, 0.5)";
                ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
                // Lapis 2: Inti Pink Terang
                ctx.fillStyle = "#ff2d75";
                ctx.fillRect(this.x - 1, this.y - 1, 2, 2);
                // Lapis 3: Titik Putih Tengah
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(this.x - 0.5, this.y - 0.5, 1, 1);
            }
        }

        function init() {
            particlesArray = [];
            const pixelData = createTextPixels();
            const density = 8; // Angka paling aman untuk kepadatan vs performa
            for (let y = 0; y < pixelData.height; y += density) {
                for (let x = 0; x < pixelData.width; x += density) {
                    if (pixelData.data[(y * 4 * pixelData.width) + (x * 4) + 3] > 128) {
                        particlesArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ 
            maxNumHands: 1, 
            modelComplexity: 0, 
            minDetectionConfidence: 0.5 
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmark = results.multiHandLandmarks[0][8];
                handX = (1 - landmark.x) * width;
                handY = landmark.y * height;
            } else {
                handX = null;
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 320, height: 240
        });

        camera.start().then(() => {
            init();
            animate();
        });

        window.addEventListener('resize', () => {
            setCanvasSize();
            init();
        });
    </script>
</body>
</html>
