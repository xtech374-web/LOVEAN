<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pixel - Jangan Sentuh Aku</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
        #video { position: absolute; bottom: 10px; right: 10px; width: 60px; opacity: 0; transform: scaleX(-1); }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const videoElement = document.getElementById("video");

        let width, height, particles = [];
        let handX = null, handY = null;

        const pCanvas = document.createElement('canvas');
        const pCtx = pCanvas.getContext('2d');
        pCanvas.width = 6; pCanvas.height = 6;
        pCtx.fillStyle = "#ff2d75"; 
        pCtx.fillRect(0, 0, 6, 6);
        pCtx.fillStyle = "#ffffff";
        pCtx.fillRect(2, 2, 2, 2);

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            init();
        }

        class Particle {
            constructor(x, y) {
                this.destX = x;
                this.destY = y;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.friction = 0.85;
                this.ease = 0.08;
            }

            update() {
                if (handX !== null) {
                    let dx = handX - this.x;
                    let dy = handY - this.y;
                    let distSq = dx * dx + dy * dy;
                    if (distSq < 7000) { 
                        let dist = Math.sqrt(distSq);
                        let force = (85 - dist) * 0.4;
                        this.vx -= (dx / dist) * force;
                        this.vy -= (dy / dist) * force;
                    }
                }
                this.vx += (this.destX - this.x) * this.ease;
                this.vy += (this.destY - this.y) * this.ease;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.drawImage(pCanvas, this.x - 2, this.y - 2);
            }
        }

        function init() {
            particles = [];
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;

            // Ukuran font disesuaikan karena teks lebih panjang
            const fontSize = Math.min(width * 0.1, 70); 
            tempCtx.font = `900 ${fontSize}px Arial`;
            tempCtx.textAlign = "center";
            tempCtx.textBaseline = "middle";
            tempCtx.fillStyle = "white";
            
            // Menggambar teks baru
            tempCtx.fillText("JANGAN SENTUH", width / 2, height / 2 - (fontSize / 1.5));
            tempCtx.fillText("AKU MASS", width / 2, height / 2 + (fontSize / 1.5));

            const data = tempCtx.getImageData(0, 0, width, height).data;
            const gap = 7; 

            for (let y = 0; y < height; y += gap) {
                for (let x = 0; x < width; x += gap) {
                    const index = (y * width + x) * 4 + 3;
                    if (data[index] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const pt = res.multiHandLandmarks[0][8];
                handX = (1 - pt.x) * width;
                handY = pt.y * height;
            } else { handX = null; }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => await hands.send({image: videoElement}),
            width: 256, height: 144
        });

        camera.start().then(() => {
            resize();
            animate();
        });

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
